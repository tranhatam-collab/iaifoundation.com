openapi: 3.0.3
info:
  title: Intent OS — Common Components
  version: 0.1.0
  description: Shared schemas, parameters, and responses used across all Intent OS APIs.

components:
  schemas:
    ApiResponse:
      type: object
      required: [ok, data, meta]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          type: object
        meta:
          type: object
          required: [request_id]
          properties:
            request_id:
              type: string
              format: uuid
            next_cursor:
              type: string
              nullable: true

    ApiError:
      type: object
      required: [ok, error, meta]
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - UNAUTHORIZED
                - FORBIDDEN
                - TENANT_SCOPE_MISMATCH
                - RESOURCE_NOT_FOUND
                - VALIDATION_ERROR
                - POLICY_DENIED
                - APPROVAL_REQUIRED
                - IDEMPOTENCY_CONFLICT
                - CONNECTOR_UNAVAILABLE
                - PAYMENT_RECONCILIATION_FAILED
                - DEVICE_QUARANTINED
                - RATE_LIMITED
                - INTERNAL_ERROR
                - RUN_STATE_INVALID
                - PAYMENT_PROVIDER_DEGRADED
                - APPROVAL_ALREADY_DECIDED
            message:
              type: string
            details:
              type: object
        meta:
          type: object
          required: [request_id]
          properties:
            request_id:
              type: string
              format: uuid

    PaginationParams:
      type: object
      properties:
        cursor:
          type: string
          description: Cursor for pagination
        limit:
          type: integer
          default: 20
          minimum: 1
          maximum: 100

    TenantContext:
      type: object
      required: [tenant_id]
      properties:
        tenant_id:
          type: string
          description: Tenant identifier

    WorkspaceContext:
      type: object
      required: [workspace_id]
      properties:
        workspace_id:
          type: string
          description: Workspace identifier

    AuditEvent:
      type: object
      properties:
        id:
          type: string
        tenant_id:
          type: string
          nullable: true
        workspace_id:
          type: string
          nullable: true
        actor_id:
          type: string
          nullable: true
        action_type:
          type: string
        resource_type:
          type: string
        resource_id:
          type: string
          nullable: true
        before_json:
          type: string
          nullable: true
        after_json:
          type: string
          nullable: true
        reason:
          type: string
          nullable: true
        request_id:
          type: string
          nullable: true
        source_ip:
          type: string
          nullable: true
        session_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    UsageMeter:
      type: object
      properties:
        meter_key:
          type: string
        quantity:
          type: number
        period_start:
          type: string
          format: date-time
        period_end:
          type: string
          format: date-time

  parameters:
    TenantIdHeader:
      name: X-Tenant-Id
      in: header
      required: true
      schema:
        type: string
      description: Tenant scope for the request

    WorkspaceIdHeader:
      name: X-Workspace-Id
      in: header
      required: false
      schema:
        type: string
      description: Workspace scope for the request

    RequestIdHeader:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: Unique request identifier

    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
      description: Idempotency key for side-effect requests

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token for authenticated requests
